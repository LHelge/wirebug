name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  quality-checks:
    name: Verify Format, Lint, and Tests
    uses: ./.github/workflows/quality-checks.yml

  build:
    name: Build ${{ matrix.target }}
    needs: quality-checks
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v6

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: wirebug-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/wirebug

  vsix:
    name: Build VSCode extension
    needs: quality-checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json

      # Version the .vsix from the release tag so it always matches, no
      # matter what package.json carries. --no-git-tag-version keeps vsce
      # from touching git in the ephemeral checkout.
      - name: Build VSIX
        working-directory: editors/vscode
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm ci
          npm run check
          npm run compile
          npx vsce package "$VERSION" --no-git-tag-version -o "wirebug-$VERSION.vsix"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: wirebug-vsix
          path: editors/vscode/wirebug-*.vsix

  release:
    name: Create GitHub Release
    needs: [build, vsix]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Rename artifacts
        run: |
          mv artifacts/wirebug-x86_64-unknown-linux-gnu/wirebug artifacts/wirebug-linux-x86_64
          mv artifacts/wirebug-x86_64-apple-darwin/wirebug artifacts/wirebug-macos-x86_64
          mv artifacts/wirebug-aarch64-apple-darwin/wirebug artifacts/wirebug-macos-aarch64

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Generate changelog
        run: git-cliff --latest --output RELEASE_NOTES.md

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            artifacts/wirebug-linux-x86_64
            artifacts/wirebug-macos-x86_64
            artifacts/wirebug-macos-aarch64
            artifacts/wirebug-vsix/*.vsix
          body_path: RELEASE_NOTES.md
          make_latest: true

  homebrew:
    name: Update Homebrew tap
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Compute checksums from release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir dl && cd dl
          gh release download "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
            -p 'wirebug-macos-aarch64' -p 'wirebug-macos-x86_64' -p 'wirebug-linux-x86_64'
          {
            echo "VERSION=$VERSION"
            echo "SHA_MAC_ARM=$(sha256sum wirebug-macos-aarch64 | cut -d' ' -f1)"
            echo "SHA_MAC_X86=$(sha256sum wirebug-macos-x86_64 | cut -d' ' -f1)"
            echo "SHA_LINUX_X86=$(sha256sum wirebug-linux-x86_64 | cut -d' ' -f1)"
          } >> "$GITHUB_ENV"

      - name: Checkout tap
        uses: actions/checkout@v6
        with:
          repository: LHelge/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: tap

      - name: Render formula
        run: |
          mkdir -p tap/Formula
          BASE="https://github.com/${GITHUB_REPOSITORY}/releases/download/v${VERSION}"
          cat > tap/Formula/wirebug.rb <<EOF
          class Wirebug < Formula
            desc "Text-defined electrical schematics and wiring harnesses"
            homepage "https://github.com/LHelge/wirebug"
            version "${VERSION}"
            license any_of: ["MIT", "Apache-2.0"]

            on_macos do
              on_arm do
                url "${BASE}/wirebug-macos-aarch64"
                sha256 "${SHA_MAC_ARM}"
              end
              on_intel do
                url "${BASE}/wirebug-macos-x86_64"
                sha256 "${SHA_MAC_X86}"
              end
            end

            on_linux do
              on_intel do
                url "${BASE}/wirebug-linux-x86_64"
                sha256 "${SHA_LINUX_X86}"
              end
            end

            def install
              bin.install Dir["wirebug-*"].first => "wirebug"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/wirebug --version")
            end
          end
          EOF

      - name: Commit & push
        run: |
          cd tap
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/wirebug.rb
          git commit -m "wirebug ${VERSION}" || { echo "No changes"; exit 0; }
          git push

  publish:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Publish
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
