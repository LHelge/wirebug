name: Reusable Quality Checks

on:
  workflow_call:

env:
  CARGO_TERM_COLOR: always

jobs:
  quality-checks:
    name: fmt · clippy · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # `render --png`/`--pdf` rasterise text through resvg/usvg, which need
      # fonts on the machine. The runner ships none, so install a sans-serif
      # family for the PNG/PDF tests (and to mirror the runtime requirement).
      - name: Install fonts
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends fonts-dejavu-core

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test
