name: CI

on:
  pull_request:
    branches: [main]

# Cancel superseded runs on the same PR branch.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt · clippy · test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # `render --png` rasterises text through resvg, which needs fonts on
      # the machine. The runner ships none, so install a sans-serif family
      # for the PNG tests (and to mirror the feature's runtime requirement).
      - name: Install fonts
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends fonts-dejavu-core

      # Caches ~/.cargo and ./target keyed on the lockfile + toolchain, so
      # clippy and test reuse one warm build.
      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test
