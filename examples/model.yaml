# A minimal Nissan Leaf-based EV powertrain: 400 V pack, main contactor,
# Leaf Gen 2 (EM57) inverter, Leaf EM57 motor.
#
# This is intentionally small. A real conversion adds a precharge
# contactor, BMS, VCU, DC-DC, charger, low-voltage harness, etc.
# Those land as the model grows.
#
# Note: contactor.coil.pos and contactor.coil.neg are defined but not
# connected here. The renderer will warn about them -- in a complete
# system they'd be driven by a VCU we haven't modelled yet.

components:
  pack:
    label: "400 V Battery"
    part_number: "Nissan Leaf 40 kWh"
    connectors:
      hv:
        label: "HV Output"
        part_number: "Amphenol Surlok"
        ports:
          pos: "1"
          neg: "2"

  contactor:
    label: "Main Contactor"
    part_number: "Gigavac GX14"
    connectors:
      power:
        ports:
          in:  "A1"
          out: "A2"
      coil:
        ports:
          pos: "X1"
          neg: "X2"

  inverter:
    label: "EM57 Inverter"
    part_number: "Nissan Leaf Gen 2"
    connectors:
      dc:
        label: "HV DC Input"
        ports:
          pos: "B+"
          neg: "B-"
      ac:
        label: "Motor Phases"
        ports:
          u: "U"
          v: "V"
          w: "W"
      resolver:
        label: "Resolver"
        ports:
          exc_p: "1"
          exc_n: "2"
          sin_p: "3"
          sin_n: "4"
          cos_p: "5"
          cos_n: "6"

  motor:
    label: "EM57 Motor"
    part_number: "Nissan Leaf EM57"
    connectors:
      terminals:
        label: "Phase Terminals"
        ports:
          u: "1"
          v: "2"
          w: "3"
      resolver:
        label: "Resolver"
        ports:
          exc_p: "1"
          exc_n: "2"
          sin_p: "3"
          sin_n: "4"
          cos_p: "5"
          cos_n: "6"

connections:
  # HV power path
  - { from: pack.hv.pos,             to: contactor.power.in }
  - { from: contactor.power.out,     to: inverter.dc.pos }
  - { from: pack.hv.neg,             to: inverter.dc.neg }

  # Three-phase AC to motor
  - { from: inverter.ac.u,           to: motor.terminals.u }
  - { from: inverter.ac.v,           to: motor.terminals.v }
  - { from: inverter.ac.w,           to: motor.terminals.w }

  # Resolver feedback
  - { from: inverter.resolver.exc_p, to: motor.resolver.exc_p }
  - { from: inverter.resolver.exc_n, to: motor.resolver.exc_n }
  - { from: inverter.resolver.sin_p, to: motor.resolver.sin_p }
  - { from: inverter.resolver.sin_n, to: motor.resolver.sin_n }
  - { from: inverter.resolver.cos_p, to: motor.resolver.cos_p }
  - { from: inverter.resolver.cos_n, to: motor.resolver.cos_n }
