# HV power path plus the motor/resolver bundle.
#
# Exercises all four sides of the rectangle:
#   - west/east: HV power flow across pack -> contactor -> inverter
#   - south:     contactor coil (unconnected here, will warn)
#   - north:     resolver bundle between inverter and motor

kind: schematic
title: "HV Power Path"

layout:
  pack:      { x:   0, y: 0 }
  contactor: { x: 280, y: 0 }
  inverter:  { x: 560, y: 0 }
  motor:     { x: 940, y: 0 }

ports:
  pack:
    east: [hv.pos, hv.neg]
  contactor:
    west:  [power.in]
    east:  [power.out]
    south: [coil.pos, coil.neg]
  inverter:
    west:  [dc.pos, dc.neg]
    east:  [ac.u, ac.v, ac.w]
    south: [resolver.exc_p, resolver.exc_n, resolver.sin_p, resolver.sin_n, resolver.cos_p, resolver.cos_n]
  motor:
    west:  [terminals.u, terminals.v, terminals.w]
    south: [resolver.exc_p, resolver.exc_n, resolver.sin_p, resolver.sin_n, resolver.cos_p, resolver.cos_n]
