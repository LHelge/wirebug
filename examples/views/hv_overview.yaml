# HV power path plus the motor/resolver bundle.
#
# Exercises all four sides of the rectangle:
#   - west/east: HV power flow across pack -> contactor -> inverter
#   - south:     contactor coil (unconnected here, will warn)
#   - north:     resolver bundle between inverter and motor

kind: schematic
title: "HV Power Path"

# x/y are the box CENTRE in grid units; the renderer multiplies by the
# grid step. Ports sit two steps apart, so a box centres on a grid line
# and ports line up across components. Omit `grid:` to take the default.
grid: 20

layout:
  pack:      { x:  4, y: 3 }
  contactor: { x: 18, y: 2 }
  inverter:  { x: 34, y: 3 }
  motor:     { x: 52, y: 3 }

ports:
  pack:
    east: [hv.pos, hv.neg]
  contactor:
    west:  [power.in]
    east:  [power.out]
    south: [coil.pos, coil.neg]
  inverter:
    west:  [dc.pos, dc.neg]
    east:  [ac.u, ac.v, ac.w]
    south: [resolver.exc_p, resolver.exc_n, resolver.sin_p, resolver.sin_n, resolver.cos_p, resolver.cos_n]
  motor:
    west:  [terminals.u, terminals.v, terminals.w]
    south: [resolver.exc_p, resolver.exc_n, resolver.sin_p, resolver.sin_n, resolver.cos_p, resolver.cos_n]
